# ---------------------------------------------------------
# 1. PAQUETES DEL SISTEMA
# ---------------------------------------------------------
[phases.setup]
aptPkgs = [
  "libzip-dev",
  "libpng-dev",
  "libonig-dev",
  "libxml2-dev",
  "libicu-dev"
]

# ---------------------------------------------------------
# 2. INSTALACIÓN DE DEPENDENCIAS
# ---------------------------------------------------------
[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --prefer-dist --ignore-platform-req=ext-intl --ignore-platform-req=ext-zip",
  "npm install"
]

# ---------------------------------------------------------
# 3. COMPILAR FRONTEND Y OPTIMIZAR LARAVEL
# ---------------------------------------------------------
[phases.build]
cmds = [
  "npm run build",
  "php artisan key:generate --force || true",
  "php artisan optimize",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

# ---------------------------------------------------------
# 4. ARCHIVOS A GUARDAR PARA EL ENTORNO DE PRODUCCIÓN
# ---------------------------------------------------------
[phases.build.artifacts]
paths = [ "public/build", "vendor", "bootstrap/cache" ]

